<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secrets Vault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #08080e;
    --surface: #10101a;
    --surface2: #17172a;
    --border: #252538;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e2f0;
    --muted: #5a5a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOCK SCREEN ── */
  #lockScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, var(--bg) 70%);
  }

  .lock-icon {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 20px rgba(124,106,247,0.5));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .lock-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
    text-align: center;
  }

  .lock-sub {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .lock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 380px;
  }

  .lock-card label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .pin-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    padding: 0.8rem 1rem;
    letter-spacing: 0.3em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  .pin-input:focus { border-color: var(--accent); }
  .pin-input.error { border-color: var(--red); animation: shake 0.3s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    width: 100%;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,106,247,0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { background: #2f2f48; color: var(--text); }

  .btn-danger {
    background: rgba(248,113,113,0.15);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.25); }

  .lock-msg {
    font-size: 0.7rem;
    text-align: center;
    margin-top: 0.75rem;
    min-height: 1.2em;
  }

  .lock-msg.error { color: var(--red); }
  .lock-msg.info { color: var(--muted); }

  /* ── VAULT ── */
  #vault { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .topbar-right { display: flex; gap: 0.5rem; align-items: center; }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .secrets-grid {
    display: grid;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .secret-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: 160px 1fr auto;
    gap: 0.75rem;
    align-items: center;
    transition: border-color 0.2s;
  }

  .secret-row:hover { border-color: #3a3a58; }

  .secret-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .secret-label input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    width: 100%;
    letter-spacing: 0.05em;
  }

  .secret-value-wrap {
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }

  .secret-value {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .secret-value:focus { border-color: var(--accent); }

  .secret-actions { display: flex; gap: 0.4rem; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.copied { border-color: var(--green); color: var(--green); }
  .icon-btn.delete:hover { border-color: var(--red); color: var(--red); }

  .add-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }

  .add-row input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 0.6rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input:focus { border-color: var(--accent); }
  .add-row input:first-child { width: 180px; }
  .add-row input:nth-child(2) { flex: 1; }

  .save-bar {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.75rem;
    color: var(--accent);
    transition: transform 0.3s ease;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(124,106,247,0.2);
  }

  .save-bar.visible { transform: translateX(-50%) translateY(0); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.75rem 1.2rem;
    font-size: 0.72rem;
    border-left: 3px solid var(--green);
    color: var(--green);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .change-pw-link {
    font-size: 0.65rem;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    text-align: center;
    display: block;
    margin-top: 0.75rem;
  }

  .change-pw-link:hover { color: var(--accent); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
    color: var(--accent2);
  }

  .modal label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    margin-top: 0.75rem;
  }

  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 0.1rem;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .modal-btns .btn { flex: 1; }
</style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">Secrets Vault</div>
  <div class="lock-sub">// encrypted credentials store</div>

  <div class="lock-card" id="loginCard">
    <label>Master Password</label>
    <input type="password" class="pin-input" id="masterPw" placeholder="••••••••" onkeydown="if(event.key==='Enter') unlock()" />
    <button class="btn btn-primary" onclick="unlock()" id="unlockBtn">Unlock Vault</button>
    <div class="lock-msg info" id="lockMsg">Enter your master password to continue</div>
    <span class="change-pw-link" onclick="showSetupModal()">First time? Set up master password</span>
  </div>
</div>

<!-- ── VAULT ── -->
<div id="vault">
  <div class="topbar">
    <div class="topbar-title">🔐 Secrets Vault</div>
    <div class="topbar-right">
      <span class="status-dot"></span>
      <span style="font-size:0.65rem;color:var(--muted);letter-spacing:0.05em">UNLOCKED</span>
      <button class="btn btn-ghost" onclick="lockVault()" style="margin-left:0.5rem">Lock</button>
    </div>
  </div>

  <div class="main">
    <!-- Preset secrets -->
    <div class="section-title">Credentials</div>
    <div class="secrets-grid" id="secretsGrid"></div>

    <!-- Add new -->
    <div class="section-title">Add Secret</div>
    <div class="add-row">
      <input type="text" id="newLabel" placeholder="Label (e.g. Stripe Key)" />
      <input type="text" id="newValue" placeholder="Value" onkeydown="if(event.key==='Enter') addSecret()" />
      <button class="btn btn-primary" onclick="addSecret()" style="white-space:nowrap">+ Add</button>
    </div>
  </div>
</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar">
  ● Unsaved changes
  <button class="btn btn-primary" style="padding:0.4rem 1rem" onclick="saveSecrets()">Save to Firestore</button>
  <button class="btn btn-ghost" style="padding:0.4rem 0.8rem" onclick="discardChanges()">Discard</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Setup / Change Password Modal -->
<div class="modal-overlay" id="setupModal">
  <div class="modal">
    <h3>Set Master Password</h3>
    <label>New Password</label>
    <input type="password" id="newPw1" placeholder="Choose a strong password" />
    <label>Confirm Password</label>
    <input type="password" id="newPw2" placeholder="Repeat password" />
    <div class="lock-msg error" id="setupMsg" style="text-align:left;margin-top:0.5rem"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeSetupModal()">Cancel</button>
      <button class="btn btn-primary" onclick="setMasterPassword()">Save Password</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnfn9hK0y-p6nvIZ_AwoJnWD7DfDuIQd4",
  authDomain: "hitwicket-cba02.firebaseapp.com",
  projectId: "hitwicket-cba02",
  storageBucket: "hitwicket-cba02.firebasestorage.app",
  messagingSenderId: "196915483829",
  appId: "1:196915483829:web:071c47af79914aec88dafc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const VAULT_DOC = "vault/secrets";
const PW_DOC = "vault/config";

// ── Crypto helpers ──
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}

async function encrypt(text, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, "cricket-vault-salt");
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
  const buf = new Uint8Array(iv.byteLength + ct.byteLength);
  buf.set(iv); buf.set(new Uint8Array(ct), iv.byteLength);
  return btoa(String.fromCharCode(...buf));
}

async function decrypt(b64, password) {
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = buf.slice(0, 12);
  const ct = buf.slice(12);
  const key = await deriveKey(password, "cricket-vault-salt");
  const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(dec);
}

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw + "cricket-salt"));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── State ──
let masterPassword = null;
let secrets = [];  // [{id, label, value, visible}]
let originalJson = "";

// ── UI helpers ──
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2500);
}

function markDirty() {
  document.getElementById('saveBar').classList.add('visible');
}

function markClean() {
  document.getElementById('saveBar').classList.remove('visible');
}

// ── Render secrets ──
function renderSecrets() {
  const grid = document.getElementById('secretsGrid');
  grid.innerHTML = '';
  if (secrets.length === 0) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:0.75rem;padding:1rem 0">No secrets yet — add one below.</div>';
    return;
  }
  secrets.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'secret-row';
    row.innerHTML = `
      <div class="secret-label">
        <input type="text" value="${escHtml(s.label)}" onchange="updateLabel(${i}, this.value)" title="Click to rename" />
      </div>
      <div class="secret-value-wrap">
        <input class="secret-value" type="${s.visible ? 'text' : 'password'}"
          value="${escHtml(s.value)}" onchange="updateValue(${i}, this.value)" />
      </div>
      <div class="secret-actions">
        <button class="icon-btn" title="${s.visible ? 'Hide' : 'Show'}" onclick="toggleVisible(${i})">${s.visible ? '🙈' : '👁'}</button>
        <button class="icon-btn" title="Copy" onclick="copySecret(${i}, this)">📋</button>
        <button class="icon-btn delete" title="Delete" onclick="deleteSecret(${i})">🗑</button>
      </div>
    `;
    grid.appendChild(row);
  });
}

window.updateLabel = (i, v) => { secrets[i].label = v; markDirty(); };
window.updateValue = (i, v) => { secrets[i].value = v; markDirty(); };
window.toggleVisible = (i) => { secrets[i].visible = !secrets[i].visible; renderSecrets(); };

window.copySecret = (i, btn) => {
  navigator.clipboard.writeText(secrets[i].value);
  btn.classList.add('copied');
  btn.textContent = '✓';
  setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋'; }, 1500);
};

window.deleteSecret = (i) => {
  if (!confirm(`Delete "${secrets[i].label}"?`)) return;
  secrets.splice(i, 1);
  renderSecrets();
  markDirty();
};

window.addSecret = () => {
  const label = document.getElementById('newLabel').value.trim();
  const value = document.getElementById('newValue').value.trim();
  if (!label) { toast('Please enter a label', true); return; }
  secrets.push({ id: Date.now().toString(), label, value, visible: false });
  document.getElementById('newLabel').value = '';
  document.getElementById('newValue').value = '';
  renderSecrets();
  markDirty();
};

// ── Save / Discard ──
window.saveSecrets = async () => {
  try {
    const json = JSON.stringify(secrets.map(s => ({ id: s.id, label: s.label, value: s.value })));
    const encrypted = await encrypt(json, masterPassword);
    await setDoc(doc(db, "vault", "secrets"), { data: encrypted, updatedAt: new Date().toISOString() });
    originalJson = json;
    markClean();
    toast('✓ Saved to Firestore');
  } catch (e) {
    toast('Save failed: ' + e.message, true);
  }
};

window.discardChanges = async () => {
  await loadSecrets();
  markClean();
  toast('Changes discarded');
};

// ── Load secrets ──
async function loadSecrets() {
  try {
    const snap = await getDoc(doc(db, "vault", "secrets"));
    if (snap.exists()) {
      const decrypted = await decrypt(snap.data().data, masterPassword);
      const parsed = JSON.parse(decrypted);
      secrets = parsed.map(s => ({ ...s, visible: false }));
      originalJson = decrypted;
    } else {
      // First time — seed with preset slots
      secrets = [
        { id: '1', label: 'GitHub Token', value: '', visible: false },
        { id: '2', label: 'Firebase API Key', value: '', visible: false },
        { id: '3', label: 'ElevenLabs API Key', value: '', visible: false },
      ];
      originalJson = "";
    }
    renderSecrets();
  } catch (e) {
    toast('Failed to load: ' + e.message, true);
  }
}

// ── Unlock ──
window.unlock = async () => {
  const pw = document.getElementById('masterPw').value;
  const btn = document.getElementById('unlockBtn');
  const msg = document.getElementById('lockMsg');
  const input = document.getElementById('masterPw');

  if (!pw) { msg.textContent = 'Please enter your password'; msg.className = 'lock-msg error'; return; }

  btn.disabled = true;
  btn.textContent = 'Unlocking...';
  msg.textContent = 'Verifying...';
  msg.className = 'lock-msg info';

  try {
    // Check if password hash is stored
    const snap = await getDoc(doc(db, "vault", "config"));
    if (!snap.exists()) {
      msg.textContent = 'No password set. Use "First time? Set up master password" below.';
      msg.className = 'lock-msg error';
      btn.disabled = false; btn.textContent = 'Unlock Vault';
      return;
    }

    const storedHash = snap.data().passwordHash;
    const inputHash = await hashPassword(pw);

    if (inputHash !== storedHash) {
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 500);
      msg.textContent = 'Incorrect password';
      msg.className = 'lock-msg error';
      btn.disabled = false; btn.textContent = 'Unlock Vault';
      return;
    }

    masterPassword = pw;
    await loadSecrets();

    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('vault').style.display = 'block';

    // Expose getter for other pages
    window.__getSecret = (label) => {
      const s = secrets.find(x => x.label.toLowerCase() === label.toLowerCase());
      return s ? s.value : null;
    };

  } catch (e) {
    msg.textContent = 'Error: ' + e.message;
    msg.className = 'lock-msg error';
    btn.disabled = false; btn.textContent = 'Unlock Vault';
  }
};

// ── Lock ──
window.lockVault = () => {
  masterPassword = null;
  secrets = [];
  document.getElementById('masterPw').value = '';
  document.getElementById('lockMsg').textContent = 'Vault locked.';
  document.getElementById('lockMsg').className = 'lock-msg info';
  document.getElementById('vault').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  markClean();
};

// ── Setup modal ──
window.showSetupModal = () => document.getElementById('setupModal').classList.add('open');
window.closeSetupModal = () => document.getElementById('setupModal').classList.remove('open');

window.setMasterPassword = async () => {
  const p1 = document.getElementById('newPw1').value;
  const p2 = document.getElementById('newPw2').value;
  const msg = document.getElementById('setupMsg');
  if (!p1) { msg.textContent = 'Please enter a password'; return; }
  if (p1 !== p2) { msg.textContent = 'Passwords do not match'; return; }
  if (p1.length < 6) { msg.textContent = 'Password must be at least 6 characters'; return; }
  try {
    const hash = await hashPassword(p1);
    await setDoc(doc(db, "vault", "config"), { passwordHash: hash, createdAt: new Date().toISOString() });
    closeSetupModal();
    toast('✓ Master password set! You can now unlock the vault.');
    document.getElementById('lockMsg').textContent = 'Password set — enter it to unlock.';
    document.getElementById('lockMsg').className = 'lock-msg info';
  } catch (e) {
    msg.textContent = 'Error: ' + e.message;
  }
};

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow enter on lock screen
document.getElementById('masterPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.unlock();
});
</script>

</body>
