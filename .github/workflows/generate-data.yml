name: Generate data.js from .dat files

on:
  push:
    paths:
      - '*.dat'   # Triggers only when a .dat file is uploaded/updated

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run extract script
        run: python3 extract_data.py

      - name: Commit and push new data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet && echo "No changes to data.js" || (
            git commit -m "Auto-regenerate data.js from updated .dat files" &&
            git push
          )
