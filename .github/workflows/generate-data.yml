name: Generate data.js

on:
  push:
    paths:
      - 'testmat.dat.gz'
      - 'testply.dat.gz'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run extract_data.py
        run: python extract_data.py

      - name: Commit updated data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "Auto-update data.js from dat files"
          git push
